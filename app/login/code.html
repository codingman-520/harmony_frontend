<body class="flex flex-col min-h-screen">

<!-- Login Form -->
<form class="flex flex-col gap-gutter-card" onsubmit="return false;">
<!-- Username Field -->
<div class="relative flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">用户名 / 邮箱</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">

</div>
<input class="w-full h-input-height pl-10 pr-4 bg-surface-card border-none rounded-xl font-body-md text-body-md text-on-surface placeholder:text-outline transition-all shadow-sm ring-1 ring-outline-variant focus:ring-2 focus:ring-primary" placeholder="请输入您的账号" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="relative flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">密码</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">

<span class="material-symbols-outlined text-[20px]">visibility_off</span>

</div>
</div>

<button class="w-full h-input-height bg-primary text-white font-headline-sm text-headline-sm rounded-full shadow-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">

<script>
        // Micro-interactions for the form
        const passwordInput = document.querySelector('input[type="password"]');
        const visibilityBtn = passwordInput?.nextElementSibling;

        if (visibilityBtn) {
            visibilityBtn.addEventListener('click', () => {
                const icon = visibilityBtn.querySelector('.material-symbols-outlined');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    icon.textContent = 'visibility';
                } else {
                    passwordInput.type = 'password';
                    icon.textContent = 'visibility_off';
                }
            });
        }

        // Simple button active state simulation
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('touchstart', () => btn.classList.add('opacity-80'));
            btn.addEventListener('touchend', () => btn.classList.remove('opacity-80'));
        });
    </script>
