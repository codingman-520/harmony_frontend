<script>
        // Simple touch feedback micro-interaction
        document.querySelectorAll('button, a').forEach(elem => {
            elem.addEventListener('touchstart', () => {
                elem.style.opacity = '0.7';
            });
            elem.addEventListener('touchend', () => {
                elem.style.opacity = '1';
            });
        });

        // Dynamic greeting based on time (Extra touch)
        window.addEventListener('DOMContentLoaded', () => {
            const hour = new Date().getHours();
            const nickname = document.querySelector('h2');
            let greeting = '张三';
            if(hour < 12) greeting = '早安，张三';
            else if(hour < 18) greeting = '午安，张三';
            else greeting = '晚安，张三';
            nickname.textContent = greeting;
        });
    </script>
