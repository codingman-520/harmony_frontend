<body class="font-body-md text-on-surface antialiased min-h-screen flex flex-col items-center">
<!-- Top AppBar - Following Shared Components Logic -->
<header class="bg-surface border-b border-outline-variant shadow-sm flex justify-between items-center px-margin-main w-full sticky top-0 z-50 h-[48px]">
<div class="flex items-center gap-3">
<button class="active:opacity-70 transition-all hover:bg-surface-container-high p-1 rounded-full">
<span class="material-symbols-outlined text-primary text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary">模拟面试</h1>
</div>
<div class="flex items-center gap-2">
<div class="flex items-center gap-1 bg-surface-container-low px-3 py-1 rounded-full border border-outline-variant">
<span class="material-symbols-outlined text-warning text-[18px]">timer</span>
<span class="font-label-md text-label-md text-on-surface-variant" id="timer">08:42</span>
</div>
<button class="active:opacity-70 transition-all hover:bg-surface-container-high p-1 rounded-full">
<span class="material-symbols-outlined text-on-surface-variant">more_vert</span>
</button>
</div>
</header>
<!-- Progress Tracker -->
<div class="w-full bg-surface-card px-margin-main py-3 flex flex-col gap-2">
<div class="flex justify-between items-center">
<span class="font-label-md text-label-md text-on-surface-variant">题目进度</span>
<span class="font-label-md text-label-md font-bold text-primary">第 1/5 题</span>
</div>
<div class="w-full h-[6px] bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full progress-bar-glow" style="width: 20%;"></div>
</div>
</div>
<!-- Main Content Canvas -->
<main class="w-full max-w-[360px] px-margin-main py-gutter-card flex flex-col gap-gutter-card flex-grow mb-[80px]">
<!-- Question Card -->
<section class="bg-surface-card rounded-xl p-4 shadow-[0_2px_8px_rgba(0,0,0,0.08)] border border-outline-variant/30">
<div class="flex items-center gap-2 mb-3">
<span class="bg-primary-container text-on-primary-container px-2 py-0.5 rounded font-label-sm text-label-sm uppercase tracking-wider">Q1</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">综合面试题</span>
</div>
<h2 class="font-headline-sm text-headline-sm text-on-surface leading-relaxed">
                请简要描述您在过往项目中遇到的最具有挑战性的技术问题，并说明您是如何定位原因并最终解决它的？
            </h2>
<div class="mt-4 flex items-center gap-2">
<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center overflow-hidden">
<img alt="AI Interviewer" class="w-full h-full object-cover" data-alt="A professional digital avatar of a young female interviewer with glasses and a friendly, focused expression. She is rendered in a clean, corporate 3D style with soft studio lighting against a blurred office background. The palette features soft grays and blues, embodying the modern technical aesthetic of a high-end AI learning platform." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDy4ERgWVFzi5OMpSqKLvUv0Pt34-FVbvBPFD648W8Pbxriq6IYp-GtfJW3oj9ud5IF5YJ6lEtcLd5HOXHHfpZy-bOsvesTVahZw04FwEq1769qi3xfaBuvs9QSmQ9h-H1IQsamZnWj59KRmYdp969MS-G51jY_W5FbDpdJgbfpJjTQxp5_2o4LwWmai94PiOa__7f7bM46A9EzefTlcSCISrU_Gyzf_xI5-FvM1Z7Qf8H9K8yVnf_XNZqE646Gib_CTWWMGK-uEfb-"/>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant italic">正在等待您的详细回答...</p>
</div>
</section>
<!-- Input Area -->
<section class="flex flex-col gap-3 flex-grow">
<div class="relative flex-grow min-h-[280px]">
<textarea class="w-full h-full bg-surface-container-lowest rounded-xl border border-outline-variant p-4 font-body-md text-body-md focus:border-primary focus:ring-0 text-area-shadow transition-all resize-none placeholder:text-outline" placeholder="请输入您的答案，可以从背景、行动和结果（STAR法则）三个维度进行阐述..."></textarea>
<div class="absolute bottom-3 right-3 font-label-sm text-label-sm text-outline">
                    0 / 1000
                </div>
</div>
<!-- Action Area -->
<div class="flex flex-col gap-3">
<button class="w-full bg-primary text-on-primary font-headline-sm text-headline-sm h-[48px] rounded-full flex items-center justify-center gap-2 active:scale-[0.98] transition-transform shadow-md">
<span>提交并下一题</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<div class="flex gap-3">
<button class="flex-1 border border-primary text-primary font-label-md text-label-md h-[40px] rounded-full flex items-center justify-center gap-1 active:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-[18px]">mic</span>
<span>语音输入</span>
</button>
<button class="flex-1 border border-outline text-on-surface-variant font-label-md text-label-md h-[40px] rounded-full flex items-center justify-center gap-1 active:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[18px]">lightbulb</span>
<span>获取提示</span>
</button>
</div>
</div>
</section>
</main>
<!-- Bottom Context (Optional suppressed FAB or status bar) -->
<!-- Note: BottomNavBar is suppressed here as per Transactional/Focused task rule -->
<script>
        // Micro-interaction for timer
        let seconds = 522; // 08:42
        const timerElement = document.getElementById('timer');
        
        setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timerElement.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);

        // Simple character count logic
        const textarea = document.querySelector('textarea');
        const countDisplay = document.querySelector('.absolute.bottom-3.right-3');
        
        textarea.addEventListener('input', () => {
            const length = textarea.value.length;
            countDisplay.textContent = `${length} / 1000`;
            if(length > 900) {
                countDisplay.classList.add('text-error');
            } else {
                countDisplay.classList.remove('text-error');
            }
        });
    </script>
</body></html>
